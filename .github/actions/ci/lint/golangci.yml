version: "2"
linters:
  default: none
  enable:
    - depguard
    - godox
    - govet
    - revive
  settings:
    depguard:
      rules:
        packages-with-error-message:
          deny:
            - pkg: io/ioutil
              desc: 'replaced by io and os packages since Go 1.16: https://tip.golang.org/doc/go1.16#ioutil'
    revive:
      rules:
        - name: defer
          arguments:
            - - loop
              - return
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: if-return
        - name: superfluous-else
        - name: unreachable-code
        - name: unused-parameter
        - name: unconditional-recursion
        - name: waitgroup-by-value
        - name: duplicated-imports
        - name: unreachable-code
        - name: context-keys-type
        - name: time-naming
        - name: var-declaration
        - name: errorf
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: false
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

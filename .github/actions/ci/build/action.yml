name: Build and Setup

description: Build and Setup

inputs:
  go_version_file:
    description: 'Path to go.mod file for determining Go version'
    required: true

runs:
  using: composite
  steps:
    - name: Setup Repo
      uses: ./.github/actions/ci/setup
      with:
        go_version_file: ${{ inputs.go_version_file }}

    - name: Build Code
      shell: bash
      run: go build -v ./...

    - name: Run Tests
      shell: bash
      run: go test -v ./...
